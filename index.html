<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock, paper and scissors</title>
    <link href="https://fonts.googleapis.com/css2?family=Google+Sans:ital,opsz,wght@0,17..18,400..700;1,17..18,400..700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Rock, paper and scissors</h1>
    <div>
    <div id="theWholeBox">
        <div id="choices">
            <p id="computerChoice">Computer choice:</p>
            <p id="playerChoice">Player choice:</p>
        </div>
        <div id="finalResult">
            <p id="result">It's a tie!</p>
        </div>
        <div id="buttons">
            <button id="Btn" onclick="playAGame(`rock`)" title="Rock">🪨</button>
            <button id="Btn" onclick="playAGame(`paper`)" title="Paper">📄</button>
            <button id="Btn" onclick="playAGame(`scissors`)" title="Scissors">✂️</button>
        </div>
        <div id="restart">
            <button id="restartBtn" title="It restarts the scores.">Restart</button>
        </div>
        <div id="scores">
    <p id="computerScore">Computer score: 0</p>
    <p id="playerScore">Player score: 0</p>
    </div>
    </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
